# ─────────────────────────────────────────────────────────────────────────────
#  NVIDIA GPU override — merge with docker-compose.yml
#
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
#  Requirements:
#    • NVIDIA Container Toolkit installed on the host
#      https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#    • nvidia-smi visible: run `nvidia-smi` to verify
# ─────────────────────────────────────────────────────────────────────────────

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
