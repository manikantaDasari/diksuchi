[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider
markers =
    unit: Unit tests (isolated, fast)
    integration: Integration tests (with mocked HTTP)
    asyncio: Async tests (requires pytest-asyncio)
    slow: Slow tests (network, timers)
    edge_case: Edge case and error scenario tests
