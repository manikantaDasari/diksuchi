# ─────────────────────────────────────────────────────────────────────────────
#  Diksuchi — Docker multi-arch build + publish to GitHub Container Registry
#
#  Triggers:
#    • Push to main     → ghcr.io/<owner>/diksuchi:latest
#    • Semver tag push  → ghcr.io/<owner>/diksuchi:1.2.3  +  :1.2  +  :1
#    • Pull request     → build only (no push), verifies image builds cleanly
#
#  Required:
#    • No extra secrets needed — GITHUB_TOKEN is auto-provided by Actions
#    • Settings → Packages → ensure "Improve container visibility" is ON
#      (or set package visibility to Public after first push)
# ─────────────────────────────────────────────────────────────────────────────

name: Docker — Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"         # e.g. v1.0.0, v2.3.1
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. your-username/diksuchi

jobs:
  build-and-push:
    name: Build (${{ matrix.platform }}) & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # needed to push to GHCR
      id-token: write           # needed for OIDC attestation (optional)

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. QEMU — enables cross-arch emulation for arm64 builds ────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Buildx — multi-platform builder ────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GHCR (skip on PRs — we only build, don't push) ───────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract metadata for tags & labels ─────────────────────────────
      #
      #   On push to main:      :latest
      #   On tag v1.2.3:        :1.2.3   :1.2   :1   :latest
      #   On PR:                pr-42  (not pushed)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 6. Build (and push if not a PR) ───────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache — speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print the published image digest ───────────────────────────────
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Published ${{ steps.meta.outputs.tags }}"
